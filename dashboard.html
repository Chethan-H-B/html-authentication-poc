<!doctype html>
<html>
  <head>
    <title>Dashboard</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap"
      rel="stylesheet"
    />

    <!-- Bootstrap Icons -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <!-- Navbar -->
    <nav class="navbar navbar-dark bg-dark navbar-expand-lg w-100">
      <div class="container">
        <a class="navbar-brand fw-bold">Auth System</a>

        <div class="ms-auto">
          <button onclick="toggleDark()" class="btn btn-secondary me-2">
            <i class="bi bi-moon"></i> Dark Mode
          </button>

          <a href="index.html" class="btn btn-danger">
            <i class="bi bi-box-arrow-right"></i> Logout
          </a>
        </div>
      </div>
    </nav>

    <!-- Main Container -->
    <div class="container container-main">
      <!-- Welcome Card -->
      <div class="row justify-content-center mb-5">
        <div class="col-md-8">
          <div class="card p-4 text-center">
            <h2 class="fw-bold">Welcome to Dashboard</h2>
            <p class="text-muted">Your login was successful.</p>
          </div>
        </div>
      </div>

      <!-- Feature Cards -->
      <div class="row g-4 justify-content-center">
        <div class="col-md-4">
          <div class="card p-4 text-center">
            <h4><i class="bi bi-person-circle"></i> Profile</h4>
            <p>Manage your account information.</p>
            <button class="btn btn-primary w-100">View Profile</button>
          </div>
        </div>

        <div class="col-md-4">
          <div class="card p-4 text-center">
            <h4><i class="bi bi-gear"></i> Settings</h4>
            <p>Update password and security.</p>
            <button class="btn btn-warning">Settings</button>
          </div>
        </div>

        <div class="col-md-4">
          <div class="card p-4 text-center">
            <h4><i class="bi bi-clock-history"></i> Activity</h4>
            <p>Check your login activity.</p>
            <button class="btn btn-success">Activity</button>
          </div>
        </div>
      </div>
    </div>

    <script>
      function toggleDark() {
        document.body.classList.toggle("dark-mode");
      }
    </script>
  </body>
</html>
