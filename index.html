<!doctype html>
<html>
  <head>
    <title>Login</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css"
      rel="stylesheet"
    />

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <div class="auth-container row g-0">
      <div class="col-md-6 auth-left">
        <h2>Welcome Back</h2>

        <p>Secure Authentication System</p>
      </div>

      <div class="col-md-6 auth-right">
        <h3 class="auth-title">Login</h3>

        <form>
          <div class="mb-3">
            <label>Email</label>

            <input type="email" class="form-control" />
          </div>

          <div class="mb-3">
            <label>Password</label>

            <div class="input-group">
              <input type="password" id="loginPass" class="form-control" />

              <button
                type="button"
                class="btn btn-outline-secondary"
                onclick="togglePassword('loginPass')"
              >
                <i class="bi bi-eye"></i>
              </button>
            </div>
          </div>

          <div class="d-grid mb-3">
            <a href="dashboard.html" class="btn btn-custom">Login</a>
          </div>
        </form>

        <a href="forgot-password.html">Forgot Password?</a><br />

        <a href="register.html">Create account</a>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
